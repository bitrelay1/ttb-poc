name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Backend: lint, SAST, SBOM ─────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Tests
        run: pytest -v

      - name: SAST — Bandit
        run: bandit -r app -c pyproject.toml -ll

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom-backend.json --format json
        working-directory: backend

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-backend
          path: backend/sbom-backend.json
          retention-days: 90

  # ── Frontend: build, security lint ────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: SAST — eslint-plugin-security
        run: npm run lint

  # ── CVE / supply-chain scan (Trivy) ───────────────────────────────────────
  trivy:
    name: Trivy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Gate 1: CVSSv3 9.0+ (CRITICAL) and 7.0+ (HIGH) with a fix available.
      # HIGH covers the CVSSv4 8.0+ range — CVSSv4 scores run lower than v3,
      # so a CVSSv4 8.0 maps to HIGH/CRITICAL in severity label terms.
      # RCEs virtually always land in CRITICAL or HIGH.
      - name: CVE gate — CRITICAL/HIGH (fixable)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # Gate 2: CRITICAL CVEs with no fix — catches CISA KEV entries and
      # actively-exploited vulnerabilities that vendors have not yet patched.
      # ignore-unfixed is intentionally false here; we never want to skip a
      # known-exploited critical regardless of patch availability.
      - name: KEV gate — unfixed CRITICAL (actively exploited)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: false

  # ── Secret scanning (Gitleaks) ────────────────────────────────────────────
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy to Railway (main branch only) ──────────────────────────────────
  deploy:
    name: Deploy
    needs: [backend, frontend, trivy, secret-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach
